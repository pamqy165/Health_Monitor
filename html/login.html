<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Hệ thống giám sát sức khỏe</title>

  <!-- Thư viện -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <!-- CỘT TRÁI: ẢNH TRƯỜNG -->
  <div class="side-image">
    <img class="campus-photo" src="../images/congtruong.png" alt="Cổng trường Đại học Công nghệ Kỹ thuật TP.HCM">
    <div class="img-overlay"></div>
  </div>

  <!-- CỘT PHẢI: FORM -->
  <div class="side-form">

    <!-- Banner logo trường -->
    <div class="banner-wrap">
      <img class="banner" src="../images/Banner Web HCMUTE.png" alt="HCM-UTE Banner">
    </div>

    <!-- Tên hệ thống -->
    <div class="sys-title">
      <h1>HỆ THỐNG GIÁM SÁT SỨC KHỎE</h1>
    </div>

    <div class="divider"></div>

    <!-- Tiêu đề form -->
    <div class="form-heading">
      <h2>ĐĂNG NHẬP</h2>
      <p>Nhập email và mật khẩu để tiếp tục</p>
    </div>

    <!-- Username -->
    <div class="field-group">
      <label for="username">Email</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
        <input type="email" id="username" placeholder="example@gmail.com" autocomplete="email">
      </div>
    </div>

    <!-- Password -->
    <div class="field-group">
      <label for="password">Mật khẩu</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
        <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
      </div>
    </div>

    <!-- Nút đăng nhập -->
    <button class="btn-login" id="btnLogin" onclick="handleLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
      </svg>
      Đăng nhập
    </button>
    <!-- Thêm link quên mật khẩu vào SAU nút đăng nhập -->
    <p style="text-align:right; font-size:13px; margin-top:8px;">
      <a href="#" onclick="handleForgotPassword()" 
        style="color:#1565C0; font-weight:600; text-decoration:none;">
        Quên mật khẩu?
      </a>
    </p>
    <!-- Thông báo lỗi -->
    <div id="loginError" 
      style="display:none; font-size:13px; 
            margin-bottom:8px; text-align:center; 
            padding: 10px 14px; border-radius: 8px;">
    </div>

    <!-- Link đăng ký -->
    <p style="text-align:center; font-size:13px; margin-top:12px; color:#78909c;">
      Chưa có tài khoản? 
      <a href="../html/register.html" 
        style="color:#1565C0; font-weight:600; text-decoration:none;">
        Đăng ký ngay
      </a>
    </p>
  </div>

  <script src="../js/firebase.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
