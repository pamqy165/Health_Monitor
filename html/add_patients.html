<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin — Gán bệnh nhân</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #F8FAFC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .card-icon {
      width: 48px; height: 48px;
      background: #DBEAFE;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }

    .card-icon svg { width: 24px; height: 24px; color: #2563EB; }

    h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .patient-list {
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .patient-tag {
      background: #DBEAFE;
      color: #2563EB;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    button {
      width: 100%;
      height: 44px;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover:not(:disabled) { background: #1d51c8; }
    button:disabled { background: #CBD5E1; cursor: not-allowed; }

    #log {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-item {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.5;
    }

    .log-item.info    { background: #F1F5F9; color: #475569; }
    .log-item.ok      { background: #ECFDF5; color: #059669; }
    .log-item.err     { background: #FEF2F2; color: #EF4444; }
    .log-item.warning { background: #FFFBEB; color: #D97706; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>

    <h2>Gán bệnh nhân vào tài khoản</h2>
    <p class="desc">
      Nhấn nút bên dưới để gán các bệnh nhân vào tài khoản đang đăng nhập.
      Nếu bệnh nhân đã được gán trước đó sẽ không bị trùng.
    </p>

    <div class="patient-list" id="patientList">
      <!-- Sẽ được điền bằng JS -->
    </div>

    <button id="runBtn" onclick="run()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Chạy
    </button>

    <div id="log"></div>
  </div>

  <script>
    // ── Danh sách bệnh nhân muốn gán ──
    const PATIENT_IDS = ['BN004', 'BN005', 'BN006'];

    // Hiển thị danh sách tag
    document.getElementById('patientList').innerHTML =
      PATIENT_IDS.map(id => `<span class="patient-tag">${id}</span>`).join('');

    function log(msg, type = 'info') {
      const div  = document.getElementById('log');
      const item = document.createElement('div');
      item.className   = `log-item ${type}`;
      item.textContent = msg;
      div.appendChild(item);
    }

    async function run() {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';

      try {
        // Chờ Firebase xác nhận trạng thái đăng nhập
        log('🔄 Đang kiểm tra trạng thái đăng nhập...');

        const user = await new Promise((resolve, reject) => {
          const unsubscribe = window.auth.onAuthStateChanged(user => {
            unsubscribe();
            if (user) resolve(user);
            else reject(new Error('Chưa đăng nhập. Hãy đăng nhập vào hệ thống trước rồi mở lại trang này.'));
          });
        });

        log(`👤 Tài khoản: ${user.email}`);
        log(`🔑 UID: ${user.uid}`);

        // Lấy patientIds hiện tại
        const userData   = await window.getUserData(user.uid);
        const currentIds = userData?.patientIds || [];

        if (currentIds.length > 0) {
          log(`📋 patientIds hiện tại: ${currentIds.join(', ')}`, 'warning');
        } else {
          log('📋 Chưa có bệnh nhân nào được gán', 'warning');
        }

        // Gộp, loại trùng
        const merged = [...new Set([...currentIds, ...PATIENT_IDS])];
        const added  = PATIENT_IDS.filter(id => !currentIds.includes(id));

        if (added.length === 0) {
          log('ℹ️ Tất cả bệnh nhân đã được gán trước đó, không cần cập nhật.', 'warning');
          btn.disabled = false;
          return;
        }

        log(`➕ Sẽ thêm mới: ${added.join(', ')}`);

        // Lưu lên Firebase
        await window.db.ref('users/' + user.uid + '/patientIds').set(merged);

        log('✅ Đã lưu thành công!', 'ok');
        log(`📊 Tổng cộng ${merged.length} bệnh nhân: ${merged.join(', ')}`, 'ok');
        log('Bạn có thể đóng trang này và vào Danh sách BN để kiểm tra.', 'ok');

      } catch (err) {
        log('❌ Lỗi: ' + err.message, 'err');
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
