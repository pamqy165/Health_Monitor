<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký — Hệ thống giám sát sức khỏe</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <!-- CỘT TRÁI: ẢNH TRƯỜNG -->
  <div class="side-image">
    <img class="campus-photo" src="../images/congtruong.png" alt="Cổng trường">
    <div class="img-overlay"></div>
  </div>

  <!-- CỘT PHẢI: FORM -->
  <div class="side-form register">

    <div class="banner-wrap">
      <img class="banner" src="../images/Banner Web HCMUTE.png" alt="HCM-UTE Banner">
    </div>

    <div class="sys-title">
      <h1>HỆ THỐNG GIÁM SÁT SỨC KHỎE</h1>
    </div>

    <div class="divider"></div>

    <div class="form-heading">
      <h2>ĐĂNG KÝ</h2>
      <p>Tạo tài khoản với mã mời từ quản trị viên</p>
    </div>

    <!-- Họ và tên -->
    <div class="field-group">
      <label>Họ và tên</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
        <input type="text" id="displayName" placeholder="Nguyễn Văn A">
      </div>
    </div>

    <!-- Email -->
    <div class="field-group">
      <label>Email</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" id="email" placeholder="example@gmail.com" autocomplete="email">
      </div>
    </div>

    <!-- Mật khẩu -->
    <div class="field-group">
      <label>Mật khẩu</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
        <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
      </div>
    </div>

    <!-- Nhập lại mật khẩu -->
    <div class="field-group">
      <label>Nhập lại mật khẩu</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
      </div>
    </div>

    <!-- Mã mời -->
    <div class="field-group">
      <label>Mã mời</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 5H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5"/>
          <path d="M15 3h6v6"/>
          <path d="m10 14 9-9"/>
        </svg>
        <input type="text" id="inviteCode" placeholder="VD: ABC123"
               style="text-transform:uppercase; letter-spacing:0.1em;">
      </div>
    </div>

    <!-- Thông báo -->
    <div id="registerMsg" class="alert-msg"></div>

    <!-- Nút đăng ký -->
    <button class="btn-register" id="btnRegister" onclick="handleRegister()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" x2="19" y1="8" y2="14"/>
        <line x1="22" x2="16" y1="11" y2="11"/>
      </svg>
      Đăng ký
    </button>

    <p style="text-align:center; font-size:13px; margin-top:12px; color:#78909c;">
      Đã có tài khoản?
      <a href="../html/login.html"
         style="color:#1565C0; font-weight:600; text-decoration:none;">
        Đăng nhập
      </a>
    </p>

  </div>

  <script src="../js/firebase.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
